<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balance ERP – Proje Analiz Aracı</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap');

:root {
  --bg:      #080c18;
  --bg2:     #0d1120;
  --card:    rgba(255,255,255,0.038);
  --card2:   rgba(255,255,255,0.065);
  --border:  rgba(255,255,255,0.075);
  --border2: rgba(255,255,255,0.14);
  --txt1: #eef2ff;
  --txt2: #7c8db5;
  --txt3: #3d4f6e;
  --accent: #6366f1;
  --accent-lt: #a5b4fc;
  --ac-dim: rgba(99,102,241,.14);
  --ac-bdr: rgba(99,102,241,.28);
  --ac-glow: rgba(99,102,241,.35);
  --ac-glow2: rgba(99,102,241,.5);
  --ac-amb1: rgba(99,102,241,.16);
  --ac-amb2: rgba(139,92,246,.10);
  --hdr-bg: rgba(8,12,24,.88);
  --sb-bg: rgba(8,12,24,.7);
  --modal-bg: #0a0e1c;
  --sw: 300px;
  --hh: 68px;
}

/* ── ACCENT THEMES ── */
[data-accent="indigo"]  { --accent:#6366f1; --accent-lt:#a5b4fc; --ac-dim:rgba(99,102,241,.14);  --ac-bdr:rgba(99,102,241,.28);  --ac-glow:rgba(99,102,241,.35);  --ac-glow2:rgba(99,102,241,.5);  --ac-amb1:rgba(99,102,241,.16);  --ac-amb2:rgba(139,92,246,.10); }
[data-accent="violet"]  { --accent:#7c3aed; --accent-lt:#c4b5fd; --ac-dim:rgba(124,58,237,.14);  --ac-bdr:rgba(124,58,237,.28);  --ac-glow:rgba(124,58,237,.35);  --ac-glow2:rgba(124,58,237,.5);  --ac-amb1:rgba(124,58,237,.16);  --ac-amb2:rgba(167,139,250,.10); }
[data-accent="cyan"]    { --accent:#0891b2; --accent-lt:#67e8f9; --ac-dim:rgba(8,145,178,.14);   --ac-bdr:rgba(8,145,178,.28);   --ac-glow:rgba(8,145,178,.35);   --ac-glow2:rgba(8,145,178,.5);   --ac-amb1:rgba(8,145,178,.16);   --ac-amb2:rgba(6,182,212,.10); }
[data-accent="emerald"] { --accent:#059669; --accent-lt:#6ee7b7; --ac-dim:rgba(5,150,105,.14);   --ac-bdr:rgba(5,150,105,.28);   --ac-glow:rgba(5,150,105,.35);   --ac-glow2:rgba(5,150,105,.5);   --ac-amb1:rgba(5,150,105,.16);   --ac-amb2:rgba(16,185,129,.10); }
[data-accent="rose"]    { --accent:#e11d48; --accent-lt:#fda4af; --ac-dim:rgba(225,29,72,.14);   --ac-bdr:rgba(225,29,72,.28);   --ac-glow:rgba(225,29,72,.35);   --ac-glow2:rgba(225,29,72,.5);   --ac-amb1:rgba(225,29,72,.16);   --ac-amb2:rgba(251,113,133,.10); }
[data-accent="amber"]   { --accent:#d97706; --accent-lt:#fcd34d; --ac-dim:rgba(217,119,6,.14);   --ac-bdr:rgba(217,119,6,.28);   --ac-glow:rgba(217,119,6,.35);   --ac-glow2:rgba(217,119,6,.5);   --ac-amb1:rgba(217,119,6,.16);   --ac-amb2:rgba(251,191,36,.10); }

/* ── LIGHT THEME ── */
[data-theme="light"] {
  --bg:      #f0f4ff;
  --bg2:     #e4eaff;
  --card:    rgba(255,255,255,.75);
  --card2:   rgba(255,255,255,.95);
  --border:  rgba(0,0,0,.09);
  --border2: rgba(0,0,0,.18);
  --txt1: #0f172a;
  --txt2: #475569;
  --txt3: #94a3b8;
  --hdr-bg: rgba(240,244,255,.92);
  --sb-bg:  rgba(228,234,255,.8);
  --modal-bg: #ffffff;
}
[data-theme="light"] body::before {
  background:
    radial-gradient(ellipse 70% 45% at 15% -5%,  var(--ac-amb1) 0%,transparent 60%),
    radial-gradient(ellipse 55% 40% at 85% 105%, var(--ac-amb2) 0%,transparent 60%),
    radial-gradient(ellipse 40% 50% at 50% 50%,  rgba(6,182,212,.04) 0%,transparent 70%);
}
[data-theme="light"] .hdr { background:var(--hdr-bg); }
[data-theme="light"] .sb  { background:var(--sb-bg); }
[data-theme="light"] .modal { background:var(--modal-bg); box-shadow:0 20px 60px rgba(0,0,0,.15); }
[data-theme="light"] .drawer { background:var(--modal-bg); border-left-color:var(--border); }
[data-theme="light"] .qg { background:rgba(255,255,255,.9); }
[data-theme="light"] .mhc { background:rgba(255,255,255,.8); }
[data-theme="light"] .nav { background:rgba(255,255,255,.8); }
[data-theme="light"] .wstat { background:rgba(255,255,255,.8); }
[data-theme="light"] .w-guide { background:rgba(255,255,255,.7); }
[data-theme="light"] .r-mc, [data-theme="light"] .r-mc2, [data-theme="light"] .r-det { background:rgba(255,255,255,.85); }
[data-theme="light"] .sb-inp { background:rgba(255,255,255,.7); color:var(--txt1); }
[data-theme="light"] .sb-inp::placeholder { color:var(--txt3); }
[data-theme="light"] .a-txt textarea, [data-theme="light"] .a-note textarea, [data-theme="light"] .num-in { background:rgba(255,255,255,.7); color:var(--txt1); }
[data-theme="light"] .hdr-pill { background:var(--ac-dim); border-color:var(--ac-bdr); }
[data-theme="light"] .dr-card { background:rgba(255,255,255,.8); }

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }

body {
  font-family:'DM Sans','Inter',-apple-system,sans-serif;
  background:var(--bg);
  color:var(--txt1);
  min-height:100vh;
  font-size:15px;
  display:flex; flex-direction:column;
  overflow:hidden;
}

/* ambient */
body::before {
  content:'';
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 70% 45% at 15% -5%,  var(--ac-amb1) 0%,transparent 60%),
    radial-gradient(ellipse 55% 40% at 85% 105%, var(--ac-amb2) 0%,transparent 60%),
    radial-gradient(ellipse 40% 50% at 50% 50%,  rgba(6,182,212,.04) 0%,transparent 70%);
}

/* ── HEADER ── */
.hdr {
  height:var(--hh);
  background:var(--hdr-bg);
  backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 22px; gap:18px;
  position:sticky; top:0; z-index:200;
}
.hdr-logo { display:flex; align-items:center; gap:11px; text-decoration:none; }
.hdr-logo-icon {
  width:40px; height:40px;
  border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  overflow:hidden;
  filter:drop-shadow(0 0 10px rgba(99,102,241,.5));
}
.hdr-logo-icon img { width:100%; height:100%; object-fit:contain; }
.hdr-logo-text { line-height:1.15; }
.hdr-logo-name { font-size:16px; font-weight:800; color:var(--txt1); letter-spacing:-.4px; }
.hdr-logo-sub  { font-size:10px; font-weight:600; color:var(--txt3); letter-spacing:2.5px; text-transform:uppercase; }

.hdr-pill {
  background:linear-gradient(135deg,rgba(99,102,241,.18),rgba(139,92,246,.18));
  border:1px solid rgba(99,102,241,.28);
  color:#a5b4fc;
  padding:5px 14px; border-radius:20px;
  font-size:11px; font-weight:800; letter-spacing:2px; text-transform:uppercase;
}
.hdr-mid { flex:1; text-align:center; font-size:12px; color:var(--txt3); line-height:1.4; }
.hdr-btns { display:flex; gap:7px; }

.hbtn {
  display:flex; align-items:center; gap:7px;
  padding:8px 16px; border-radius:9px;
  font-size:13px; font-weight:600; cursor:pointer;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--txt2);
  transition:all .18s; font-family:inherit;
}
.hbtn svg { width:14px; height:14px; flex-shrink:0; }
.hbtn:hover { border-color:var(--border2); color:var(--txt1); background:var(--card2); }
.hbtn.prime {
  background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 60%,#8b5cf6));
  border-color:transparent; color:#fff;
  box-shadow:0 3px 14px var(--ac-glow);
}
.hbtn.prime:hover { box-shadow:0 5px 20px var(--ac-glow2); transform:translateY(-1px); }

/* ── LAYOUT ── */
.layout {
  display:flex; flex:1;
  height:calc(100vh - var(--hh));
  overflow:hidden; position:relative; z-index:1;
}

/* ── SIDEBAR ── */
.sb {
  width:var(--sw);
  background:rgba(8,12,24,.7);
  backdrop-filter:blur(20px);
  border-right:1px solid var(--border);
  overflow-y:auto; flex-shrink:0;
  display:flex; flex-direction:column;
}

.sb-proj {
  padding:18px 16px 14px;
  border-bottom:1px solid var(--border);
}
.sb-lbl {
  font-size:11px; font-weight:700; color:var(--txt3);
  letter-spacing:1.5px; text-transform:uppercase;
  display:block; margin-bottom:6px;
}
.sb-inp {
  width:100%;
  padding:8px 12px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  border-radius:8px;
  font-size:13px; font-weight:500; color:var(--txt1);
  outline:none; margin-bottom:10px; transition:all .18s;
  font-family:inherit;
}
.sb-inp:focus {
  border-color:var(--ac-bdr);
  background:var(--ac-dim);
  box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 15%,transparent);
}
.sb-inp::placeholder { color:var(--txt3); }
.sb-inp:last-child { margin-bottom:0; }

.sb-prog {
  padding:12px 16px;
  border-bottom:1px solid var(--border);
}
.sb-prog-row { display:flex; justify-content:space-between; margin-bottom:7px; }
.sb-prog-lbl { font-size:12px; color:var(--txt3); }
.sb-prog-pct {
  font-size:14px; font-weight:800;
  background:linear-gradient(90deg,#6366f1,#a78bfa);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.sb-prog-track { height:3px; background:rgba(255,255,255,.06); border-radius:2px; overflow:hidden; }
.sb-prog-fill {
  height:100%;
  background:linear-gradient(90deg,#6366f1,#a78bfa,#38bdf8);
  border-radius:2px; width:0%; transition:width .5s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 7px rgba(99,102,241,.6);
}

.sb-sec { font-size:11px; font-weight:700; color:var(--txt3); letter-spacing:1.5px; text-transform:uppercase; padding:14px 16px 8px; }

.mod-row {
  display:flex; align-items:center; gap:10px;
  padding:9px 16px; cursor:pointer; transition:all .15s;
  border-left:2px solid transparent; position:relative;
}
.mod-row::after {
  content:''; position:absolute; inset:0;
  background:transparent; transition:background .15s;
}
.mod-row:hover::after { background:rgba(255,255,255,.025); }
.mod-row.on { border-left-color:var(--accent); background:linear-gradient(90deg,rgba(99,102,241,.1) 0%,transparent 100%); }
.mod-row.on .mod-lbl { color:#c7d2fe; font-weight:600; }

.mod-ico {
  width:30px; height:30px;
  border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all .2s;
  border:1px solid rgba(255,255,255,.07);
}
.mod-ico svg { width:15px; height:15px; }
.mod-row.on .mod-ico { box-shadow:0 0 10px rgba(99,102,241,.28); }

.mod-lbl { font-size:14px; font-weight:500; color:var(--txt2); flex:1; }

.mod-dot {
  width:20px; height:20px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:9px; font-weight:800;
}
.d-e { background:rgba(255,255,255,.04); color:var(--txt3); border:1px solid var(--border); }
.d-y { background:rgba(16,185,129,.13); color:#34d399; border:1px solid rgba(52,211,153,.28); }
.d-p { background:rgba(245,158,11,.13); color:#fbbf24; border:1px solid rgba(251,191,36,.28); }
.d-n { background:rgba(239,68,68,.1);  color:#f87171; border:1px solid rgba(248,113,113,.22); }

/* ── MAIN ── */
.main {
  flex:1; overflow-y:auto;
  padding:26px 30px;
  display:flex; flex-direction:column; gap:18px;
}

/* ── WELCOME ── */
.welcome { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; text-align:center; gap:26px; padding:50px 40px; }

.w-icon-ring {
  width:140px; height:140px;
  display:flex; align-items:center; justify-content:center;
  animation:wfloat 4s ease-in-out infinite;
  position:relative;
  filter:drop-shadow(0 0 28px rgba(99,102,241,.55)) drop-shadow(0 0 70px rgba(139,92,246,.25));
}
.w-icon-ring img { width:100%; height:100%; object-fit:contain; }
@keyframes wfloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-9px);} }

.welcome h2 { font-size:30px; font-weight:900; color:var(--txt1); letter-spacing:-1px; line-height:1.2; }
.welcome h2 em {
  font-style:normal;
  background:linear-gradient(135deg,#818cf8,#a78bfa,#38bdf8);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.welcome p { font-size:16px; color:var(--txt2); max-width:520px; line-height:1.8; }

.w-stats { display:flex; gap:12px; }
.wstat {
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; padding:16px 26px; text-align:center;
  backdrop-filter:blur(10px); transition:all .2s; cursor:default;
}
.wstat:hover { border-color:var(--border2); background:var(--card2); transform:translateY(-2px); }
.wstat-n {
  font-size:30px; font-weight:900;
  background:linear-gradient(135deg,#6366f1,#a78bfa);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  line-height:1;
}
.wstat-l { font-size:12px; color:var(--txt3); margin-top:5px; font-weight:600; letter-spacing:.5px; }

.w-guide {
  background:linear-gradient(135deg,rgba(16,185,129,.06),rgba(6,182,212,.05));
  border:1px solid rgba(16,185,129,.14);
  border-radius:14px; padding:18px 24px; max-width:480px; text-align:left;
}
.wg-h {
  font-size:11px; font-weight:800; color:#6ee7b7; letter-spacing:1.5px; text-transform:uppercase;
  margin-bottom:12px; display:flex; align-items:center; gap:7px;
}
.wg-h svg { width:14px; height:14px; }
.wg-s { font-size:14px; color:var(--txt2); padding:4px 0; display:flex; align-items:flex-start; gap:9px; line-height:1.7; }
.wg-n {
  min-width:22px; height:22px;
  background:rgba(99,102,241,.2); border:1px solid rgba(99,102,241,.3);
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:800; color:#a5b4fc; flex-shrink:0; margin-top:1px;
}

/* ── MODULE HEADER ── */
.mhc {
  background:var(--card); border:1px solid var(--border);
  border-radius:18px; padding:20px 24px;
  display:flex; align-items:center; gap:16px;
  backdrop-filter:blur(10px); position:relative; overflow:hidden;
}
.mhc-bg {
  position:absolute; top:-30px; right:-30px;
  width:160px; height:160px; border-radius:50%; pointer-events:none;
  opacity:.07; filter:blur(30px);
}
.mhc-ico {
  width:52px; height:52px; border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; position:relative; z-index:1;
}
.mhc-ico svg { width:26px; height:26px; }
.mhc-info { flex:1; z-index:1; }
.mhc-info h2 { font-size:20px; font-weight:800; color:var(--txt1); letter-spacing:-.4px; }
.mhc-info p  { font-size:13px; color:var(--txt2); margin-top:3px; }
.mhc-tog { display:flex; gap:6px; z-index:1; }
.tbtn {
  padding:8px 16px; border-radius:9px;
  font-size:12px; font-weight:800; letter-spacing:.3px;
  cursor:pointer; border:1px solid var(--border);
  background:var(--card); color:var(--txt3);
  transition:all .16s; font-family:inherit;
}
.tbtn:hover { border-color:var(--border2); color:var(--txt2); }
.tbtn-y.sel { background:rgba(16,185,129,.14); border-color:rgba(52,211,153,.35); color:#34d399; }
.tbtn-p.sel { background:rgba(245,158,11,.13); border-color:rgba(251,191,36,.35); color:#fbbf24; }
.tbtn-n.sel { background:rgba(239,68,68,.11); border-color:rgba(248,113,113,.28); color:#f87171; }

/* ── QUESTION GROUP ── */
.qg {
  background:var(--card); border:1px solid var(--border);
  border-radius:18px; overflow:hidden; backdrop-filter:blur(10px);
  transition:border-color .18s;
}
.qg:hover { border-color:var(--border2); }
.qg-hdr {
  padding:14px 20px;
  background:rgba(255,255,255,.018);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:9px;
}
.qg-badge {
  font-size:10px; font-weight:900; padding:3px 9px; border-radius:5px;
  letter-spacing:1px; text-transform:uppercase;
}
.qg-title { font-size:14px; font-weight:700; color:var(--txt1); }
.qg-desc  { font-size:12px; color:var(--txt3); margin-left:auto; }

.qi {
  padding:16px 20px;
  border-bottom:1px solid rgba(255,255,255,.035);
  transition:background .12s;
}
.qi:last-child { border-bottom:none; }
.qi:hover { background:rgba(255,255,255,.018); }

.qi-q {
  font-size:15px; font-weight:500; color:var(--txt1);
  margin-bottom:12px; display:flex; align-items:flex-start; gap:7px; line-height:1.6;
}
.qi-req { color:#f87171; font-size:13px; flex-shrink:0; margin-top:1px; }

/* answer types */
.a-yn { display:flex; gap:8px; }
.yn {
  padding:9px 22px; border-radius:9px;
  font-size:13px; font-weight:700; cursor:pointer;
  border:1px solid var(--border); background:var(--card);
  color:var(--txt3); transition:all .15s;
}
.yn:hover { border-color:var(--border2); color:var(--txt2); }
.yn.y { background:rgba(16,185,129,.12); border-color:rgba(52,211,153,.32); color:#34d399; }
.yn.p { background:rgba(245,158,11,.11); border-color:rgba(251,191,36,.32); color:#fbbf24; }
.yn.n { background:rgba(239,68,68,.1);   border-color:rgba(248,113,113,.28);color:#f87171; }

.a-opts { display:flex; flex-wrap:wrap; gap:7px; }
.opt {
  padding:8px 16px; border-radius:20px;
  font-size:13px; font-weight:500; cursor:pointer;
  border:1px solid var(--border); background:rgba(255,255,255,.025);
  color:var(--txt2); transition:all .15s;
}
.opt:hover { border-color:var(--ac-bdr); color:var(--accent-lt); background:var(--ac-dim); }
.opt.sel  { background:var(--ac-dim); border-color:var(--ac-bdr); color:var(--accent-lt); font-weight:600; }

.a-num { display:flex; align-items:center; gap:9px; }
.num-in {
  width:120px; padding:7px 13px;
  background:rgba(255,255,255,.04); border:1px solid var(--border);
  border-radius:9px; font-size:13px; font-weight:600; color:var(--txt1);
  outline:none; transition:all .16s; font-family:inherit;
}
.num-in:focus { border-color:var(--ac-bdr); background:var(--ac-dim); box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 12%,transparent); }
.num-unit { font-size:13px; color:var(--txt3); font-weight:500; }

.a-txt textarea {
  width:100%; padding:11px 14px;
  background:rgba(255,255,255,.04); border:1px solid var(--border);
  border-radius:10px; font-size:14px; color:var(--txt1);
  outline:none; resize:vertical; min-height:75px;
  font-family:inherit; line-height:1.7; transition:all .16s;
}
.a-txt textarea:focus { border-color:var(--ac-bdr); background:var(--ac-dim); box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 10%,transparent); }

.a-note { }
.note-lbl {
  font-size:11px; font-weight:800; color:#d97706; letter-spacing:1.5px;
  text-transform:uppercase; margin-bottom:6px;
  display:flex; align-items:center; gap:6px;
}
.note-lbl svg { width:13px; height:13px; }
.a-note textarea {
  width:100%; padding:11px 14px;
  background:rgba(245,158,11,.05); border:1px solid rgba(245,158,11,.18);
  border-radius:10px; font-size:14px; color:#fde68a;
  outline:none; resize:vertical; min-height:60px;
  font-family:inherit; line-height:1.7; transition:all .16s;
}
.a-note textarea:focus { border-color:rgba(245,158,11,.38); background:rgba(245,158,11,.07); }
.a-note textarea::placeholder { color:rgba(217,119,6,.35); }

/* sub-mod tags */
.sm-grid { display:flex; flex-wrap:wrap; gap:6px; margin-top:9px; }
.sm-tag {
  padding:7px 15px; border-radius:20px; font-size:13px; font-weight:500;
  cursor:pointer; border:1px solid var(--border); background:rgba(255,255,255,.025);
  color:var(--txt2); transition:all .15s; user-select:none;
}
.sm-tag:hover { border-color:var(--ac-bdr); color:var(--accent-lt); }
.sm-tag.sel { background:var(--ac-dim); border-color:var(--ac-bdr); color:var(--accent-lt); font-weight:600; }

/* ── NAV BAR ── */
.nav {
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; padding:13px 18px;
  display:flex; align-items:center; gap:10px;
  backdrop-filter:blur(10px);
}
.nav-btn {
  display:flex; align-items:center; gap:7px;
  padding:9px 20px; border-radius:9px;
  font-size:13px; font-weight:700; cursor:pointer;
  border:1px solid var(--border); background:var(--card);
  color:var(--txt2); transition:all .16s; font-family:inherit;
}
.nav-btn svg { width:14px; height:14px; }
.nav-btn:hover { border-color:var(--border2); color:var(--txt1); }
.nav-next {
  margin-left:auto;
  background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 60%,#8b5cf6));
  border-color:transparent; color:#fff;
  box-shadow:0 3px 14px var(--ac-glow);
}
.nav-next:hover { box-shadow:0 5px 20px var(--ac-glow2); transform:translateY(-1px); }
.nav-report {
  margin-left:auto;
  background:linear-gradient(135deg,#059669,#10b981);
  border-color:transparent; color:#fff;
  box-shadow:0 3px 14px rgba(16,185,129,.3);
}
.nav-report:hover { box-shadow:0 5px 20px rgba(16,185,129,.48); transform:translateY(-1px); }
.nav-info { font-size:12px; color:var(--txt3); }

/* ── MODAL ── */
.ov {
  position:fixed; inset:0;
  background:rgba(4,6,16,.82); backdrop-filter:blur(14px);
  z-index:999; display:none; align-items:center; justify-content:center; padding:22px;
}
.ov.open { display:flex; }

.modal {
  background:#0a0e1c; border:1px solid var(--border);
  border-radius:22px; width:100%; max-width:960px; max-height:90vh;
  overflow:hidden; display:flex; flex-direction:column;
  box-shadow:0 30px 80px rgba(0,0,0,.65), 0 0 0 1px rgba(255,255,255,.04) inset;
  animation:min .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes min { from{opacity:0;transform:scale(.96) translateY(10px);} to{opacity:1;transform:scale(1) translateY(0);} }

.m-hdr {
  padding:20px 26px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:13px;
  background:rgba(255,255,255,.018);
}
.m-hdr-ico {
  width:42px; height:42px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  border-radius:11px; display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 18px rgba(99,102,241,.32);
}
.m-hdr-ico svg { width:20px; height:20px; color:#fff; }
.m-hdr h3 { font-size:18px; font-weight:800; color:var(--txt1); flex:1; }
.m-close {
  width:32px; height:32px; border-radius:8px;
  border:1px solid var(--border); background:var(--card);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  color:var(--txt2); transition:all .16s;
}
.m-close svg { width:14px; height:14px; }
.m-close:hover { border-color:var(--border2); color:var(--txt1); }

.m-body { flex:1; overflow-y:auto; padding:26px; }

.m-ftr {
  padding:16px 26px; border-top:1px solid var(--border);
  display:flex; gap:9px; justify-content:flex-end;
  background:rgba(255,255,255,.012);
}
.mbtn {
  display:flex; align-items:center; gap:7px;
  padding:10px 22px; border-radius:10px;
  font-size:14px; font-weight:700; cursor:pointer;
  border:none; transition:all .18s; font-family:inherit;
}
.mbtn svg { width:13px; height:13px; }
.mbtn-g  { background:var(--card); border:1px solid var(--border); color:var(--txt2); }
.mbtn-g:hover { border-color:var(--border2); color:var(--txt1); }
.mbtn-j  { background:var(--ac-dim); border:1px solid var(--ac-bdr); color:var(--accent-lt); }
.mbtn-j:hover { background:color-mix(in srgb,var(--accent) 22%,transparent); }
.mbtn-p  { background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 60%,#8b5cf6)); color:#fff; box-shadow:0 3px 14px var(--ac-glow); }
.mbtn-p:hover { box-shadow:0 5px 20px var(--ac-glow2); transform:translateY(-1px); }

/* Report */
.r-meta { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
.r-mc { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:13px 16px; }
.r-mc-l { font-size:11px; font-weight:800; color:var(--txt3); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:5px; }
.r-mc-v { font-size:16px; font-weight:800; color:var(--txt1); }

.r-sec { margin-bottom:24px; }
.r-sec-t {
  font-size:11px; font-weight:800; color:var(--txt3);
  letter-spacing:1.5px; text-transform:uppercase; margin-bottom:12px;
  display:flex; align-items:center; gap:9px;
}
.r-sec-t::after { content:''; flex:1; height:1px; background:var(--border); }

.r-mod-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
.r-mc2 {
  background:var(--card); border:1px solid var(--border);
  border-radius:11px; padding:12px 15px;
  display:flex; align-items:center; gap:11px; transition:all .16s;
}
.r-mc2.s-y { border-left:3px solid #10b981; }
.r-mc2.s-p { border-left:3px solid #f59e0b; }
.r-mc2.s-n { border-left:3px solid #1f2937; opacity:.45; }
.r-mc2-ico { width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.r-mc2-ico svg { width:15px; height:15px; }
.r-mc2-info h5 { font-size:13px; font-weight:700; color:var(--txt1); }
.r-mc2-info p  { font-size:11px; color:var(--txt3); margin-top:2px; }
.rbadge { margin-left:auto; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:800; }
.rb-y { background:rgba(16,185,129,.12); color:#34d399; }
.rb-p { background:rgba(245,158,11,.12); color:#fbbf24; }
.rb-n { background:rgba(255,255,255,.05); color:var(--txt3); }

.r-det { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:10px; }
.r-det-h {
  padding:13px 17px; background:rgba(255,255,255,.02);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:9px;
}
.r-det-h-ico { width:28px; height:28px; border-radius:7px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.r-det-h-ico svg { width:14px; height:14px; }
.r-det-title { font-size:15px; font-weight:800; color:var(--txt1); flex:1; }
.r-body { padding:10px 16px; display:flex; flex-direction:column; gap:5px; }
.r-row {
  display:flex; align-items:flex-start; gap:9px;
  padding:6px 9px; background:rgba(255,255,255,.018);
  border-radius:7px; border:1px solid rgba(255,255,255,.04);
}
.r-q { font-size:13px; color:var(--txt3); flex-shrink:0; min-width:195px; line-height:1.6; }
.r-a { font-size:13px; color:var(--txt1); font-weight:600; flex:1; }
.r-note {
  background:rgba(245,158,11,.07); border:1px solid rgba(245,158,11,.18);
  border-radius:9px; padding:10px 14px; font-size:13px; color:#fde68a; margin-top:7px; line-height:1.7;
}
.r-faz {
  background:linear-gradient(135deg,rgba(16,185,129,.06),rgba(6,182,212,.05));
  border:1px solid rgba(16,185,129,.14); border-radius:12px;
  padding:16px 20px; font-size:14px; line-height:2; color:var(--txt2);
}
.faz-t { color:#6ee7b7; font-weight:700; }

/* scrollbar */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,.07); border-radius:2px; }
::-webkit-scrollbar-thumb:hover { background:rgba(255,255,255,.13); }

/* toast */
.toast {
  position:fixed; bottom:26px; right:26px;
  padding:13px 22px; border-radius:11px; font-size:14px; font-weight:700;
  z-index:9999; animation:tin .28s cubic-bezier(.34,1.56,.64,1);
  backdrop-filter:blur(10px); border:1px solid;
}
@keyframes tin { from{opacity:0;transform:translateY(6px) scale(.95);} to{opacity:1;transform:translateY(0) scale(1);} }
.t-ok   { background:rgba(5,150,105,.88); border-color:rgba(52,211,153,.28); color:#fff; box-shadow:0 6px 24px rgba(5,150,105,.28); }
.t-warn { background:rgba(161,61,5,.88);  border-color:rgba(251,191,36,.28); color:#fff; }

/* ── THEME PANEL ── */
.tp-btn {
  display:flex; align-items:center; justify-content:center;
  width:38px; height:38px; border-radius:10px;
  border:1px solid var(--border); background:var(--card);
  cursor:pointer; color:var(--txt2); transition:all .18s;
  flex-shrink:0;
}
.tp-btn:hover { border-color:var(--border2); color:var(--txt1); }
.tp-btn svg { width:17px; height:17px; }

.tp-popup {
  position:fixed; top:calc(var(--hh) + 8px); right:18px;
  width:260px; background:var(--modal-bg);
  border:1px solid var(--border2);
  border-radius:18px; padding:18px;
  box-shadow:0 20px 60px rgba(0,0,0,.45);
  z-index:500; display:none; flex-direction:column; gap:16px;
  animation:tin .2s cubic-bezier(.34,1.56,.64,1);
}
.tp-popup.open { display:flex; }

.tp-section-label {
  font-size:10px; font-weight:800; color:var(--txt3);
  letter-spacing:1.5px; text-transform:uppercase; margin-bottom:8px;
}

/* Dark/Light Toggle */
.tp-mode {
  display:flex; background:var(--card);
  border:1px solid var(--border); border-radius:12px; padding:4px; gap:4px;
}
.tp-mode-btn {
  flex:1; padding:8px; border-radius:9px; border:none;
  cursor:pointer; font-size:13px; font-weight:600;
  font-family:inherit; transition:all .18s;
  background:transparent; color:var(--txt3);
  display:flex; align-items:center; justify-content:center; gap:6px;
}
.tp-mode-btn svg { width:14px; height:14px; }
.tp-mode-btn.active {
  background:var(--card2); color:var(--txt1);
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}
[data-theme="light"] .tp-mode-btn.active { box-shadow:0 2px 8px rgba(0,0,0,.1); }

/* Accent Swatches */
.tp-swatches { display:flex; gap:8px; flex-wrap:wrap; }
.tp-swatch {
  width:36px; height:36px; border-radius:10px;
  cursor:pointer; border:3px solid transparent;
  transition:all .18s; position:relative;
}
.tp-swatch:hover { transform:scale(1.12); }
.tp-swatch.active { border-color:var(--txt1); transform:scale(1.08); }
.tp-swatch.active::after {
  content:'✓'; position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:900; color:#fff;
  text-shadow:0 1px 3px rgba(0,0,0,.5);
}

/* ── ANALİZLERİM DRAWER ── */
.drawer-ov {
  position:fixed; inset:0; z-index:500;
  background:rgba(4,6,16,.6); backdrop-filter:blur(8px);
  display:none; justify-content:flex-end;
}
.drawer-ov.open { display:flex; }
.drawer {
  width:420px; max-width:95vw;
  background:#0a0e1c;
  border-left:1px solid var(--border);
  display:flex; flex-direction:column;
  box-shadow:-20px 0 60px rgba(0,0,0,.5);
  animation:drawin .25s cubic-bezier(.4,0,.2,1);
}
@keyframes drawin { from{transform:translateX(100%);} to{transform:translateX(0);} }

.dr-hdr {
  padding:22px 22px 18px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:12px;
  background:rgba(255,255,255,.018);
  flex-shrink:0;
}

  width:38px; height:38px; border-radius:10px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);

  flex-shrink:0; box-shadow:0 0 14px rgba(99,102,241,.35);
}

.dr-hdr-info p  { font-size:12px; color:var(--txt3); margin-top:2px; }
.dr-close {
  margin-left:auto; width:32px; height:32px; border-radius:8px;
  border:1px solid var(--border); background:transparent;

}

.dr-new {

  padding:11px; border-radius:11px; border:none;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:#fff; font-size:14px; font-weight:700;
  cursor:pointer; font-family:inherit;

  box-shadow:0 4px 16px rgba(99,102,241,.35); transition:all .18s;
}
.dr-new:hover { box-shadow:0 6px 22px rgba(99,102,241,.5); transform:translateY(-1px); }
.dr-new svg { width:16px; height:16px; }

.dr-list {
  flex:1; overflow-y:auto; padding:0 16px 16px;
  display:flex; flex-direction:column; gap:10px;
}

.dr-empty {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:12px; padding:60px 20px; text-align:center;
}
.dr-empty-ico { font-size:48px; opacity:.25; }
.dr-empty p { font-size:14px; color:var(--txt3); line-height:1.6; }

.dr-card {

  border-radius:14px; padding:16px; cursor:pointer;
  transition:all .18s; position:relative; overflow:hidden;
}
.dr-card:hover { border-color:var(--border2); background:var(--card2); transform:translateY(-1px); }

  border:1px solid rgba(99,102,241,.25);
  display:flex; align-items:center; justify-content:center;
  font-size:16px; font-weight:800; color:#a5b4fc;
}

.dr-card-time { font-size:11px; color:var(--txt3); margin-top:2px; }
.dr-card-stats { display:flex; gap:8px; margin-bottom:12px; }
.dr-stat {
  flex:1; background:rgba(255,255,255,.03); border:1px solid var(--border);
  border-radius:8px; padding:7px 10px; text-align:center;
}
.dr-stat-n { font-size:16px; font-weight:800; color:var(--txt1); }
.dr-stat-l { font-size:10px; color:var(--txt3); margin-top:1px; }
.dr-stat.yes .dr-stat-n { color:#34d399; }
.dr-stat.par .dr-stat-n { color:#fbbf24; }
.dr-card-btns { display:flex; gap:8px; }
.dr-btn-load {
  flex:1; padding:8px; border-radius:9px; border:none;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:#fff; font-size:13px; font-weight:700;
  cursor:pointer; font-family:inherit; transition:all .16s;
  display:flex; align-items:center; justify-content:center; gap:6px;
}
.dr-btn-load:hover { box-shadow:0 4px 14px rgba(99,102,241,.45); }
.dr-btn-load svg { width:14px; height:14px; }
.dr-btn-del {

}
.dr-btn-del:hover { background:rgba(239,68,68,.14); border-color:rgba(239,68,68,.35); }
.dr-btn-del svg { width:14px; height:14px; }

// ── STATE ──────────────────────────────────────────────────
let curId = null, answers = {}, modSt = {};

// ── INIT ───────────────────────────────────────────────────
function init() {
  document.getElementById('analysisDate').value = new Date().toISOString().split('T')[0];
  buildSB(); renderWelcome(); loadThemePrefs();
}
function onCI() {
  const v = document.getElementById('customerName').value;
  document.getElementById('hTitle').textContent = v ? `${v} · ERP Proje Analizi` : 'Müşteri Proje Analiz ve Gereksinim Yönetimi';
}

// ── SIDEBAR ────────────────────────────────────────────────
function buildSB() {
  let h = '';
  MODULES.forEach(m => {
    const s = modSt[m.id]||'';
    let dc='d-e', dt='○';
    if(s==='yes'){dc='d-y';dt='✓';} else if(s==='partial'){dc='d-p';dt='~';} else if(s==='no'){dc='d-n';dt='✗';}
    h += `<div class="mod-row ${curId===m.id?'on':''}" onclick="sel('${m.id}')">
      <div class="mod-ico" style="background:${m.bg};color:${m.color};">
        <svg style="width:15px;height:15px;"><use href="#${m.icon}"/></svg>
      </div>
      <span class="mod-lbl">${m.name}</span>
      <span class="mod-dot ${dc}">${dt}</span>
    </div>`;
  });
  document.getElementById('sbList').innerHTML = h;
  const done = MODULES.filter(m=>modSt[m.id]&&modSt[m.id]!=='').length;
  const pct = Math.round(done/MODULES.length*100);
  document.getElementById('progPct').textContent = pct+'%';
  document.getElementById('progFill').style.width = pct+'%';
}

// ── MODULE RENDER ──────────────────────────────────────────
function sel(id) { curId=id; buildSB(); renderMod(id); }

function renderMod(id) {
  const m = MODULES.find(x=>x.id===id);
  const s = modSt[id]||'';
  const idx = MODULES.findIndex(x=>x.id===id);
  const isLast = idx===MODULES.length-1;
  const groups = QUESTIONS[id]||[];

  let h = `
    <div class="mhc" style="border-color:${m.color}25;">
      <div class="mhc-bg" style="background:${m.color};"></div>
      <div class="mhc-ico" style="background:${m.bg}; color:${m.color}; box-shadow:0 0 22px ${m.glow};">
        <svg style="width:26px;height:26px;"><use href="#${m.icon}"/></svg>
      </div>
      <div class="mhc-info"><h2>${m.name}</h2><p>${m.desc}</p></div>
      <div class="mhc-tog">
        <button class="tbtn tbtn-y ${s==='yes'?'sel':''}"     onclick="setSt('${id}','yes')">Kullanıyor</button>
        <button class="tbtn tbtn-p ${s==='partial'?'sel':''}" onclick="setSt('${id}','partial')">Kısmen</button>
        <button class="tbtn tbtn-n ${s==='no'?'sel':''}"      onclick="setSt('${id}','no')">Kullanmıyor</button>
      </div>
    </div>`;

  groups.forEach(g => {
    h += `<div class="qg">
      <div class="qg-hdr">
        <span class="qg-badge" style="background:${m.color}1a;color:${m.color};border:1px solid ${m.color}38;">${g.badge}</span>
        <span class="qg-title">${g.title}</span>
        ${g.desc?`<span class="qg-desc">${g.desc}</span>`:''}
      </div>`;
    g.qs.forEach(q => { h += renderQ(q); });
    h += `</div>`;
  });

  const subs = SUBMODULES[id]||[];
  if (subs.length) {
    h += `<div class="qg">
      <div class="qg-hdr">
        <span class="qg-badge" style="background:${m.color}1a;color:${m.color};border:1px solid ${m.color}38;">ALT MODÜLLER</span>
        <span class="qg-title">Kullanılacak Alt Ekranlar</span>
        <span class="qg-desc">İhtiyaç duyulanları seçin</span>
      </div>
      <div class="qi">
        <div class="qi-q">Bu modül kapsamında hangi alt ekranlar / özellikler kullanılacak?</div>
        <div class="sm-grid" id="smg_${id}">`;
    subs.forEach(sm => {
      const k = `sm_${id}_${sm.replace(/\W+/g,'_')}`;
      h += `<span class="sm-tag ${answers[k]==='1'?'sel':''}" onclick="tSm('${id}','${sm.replace(/'/g,"\\'")}','${k}')">${sm}</span>`;
    });
    h += `</div></div></div>`;
  }

  h += `<div class="nav">
    ${idx>0?`<button class="nav-btn" onclick="sel('${MODULES[idx-1].id}')"><svg><use href="#i-left"/></svg> Önceki</button>`:'<span></span>'}
    <span class="nav-info">Modül ${idx+1} / ${MODULES.length}</span>
    ${isLast
      ? `<button class="nav-btn nav-report" onclick="showRpt()"><svg><use href="#i-clip"/></svg> Rapor Oluştur</button>`
      : `<button class="nav-btn nav-next" onclick="sel('${MODULES[idx+1].id}')">Sonraki <svg><use href="#i-right"/></svg></button>`}
  </div>`;

  document.getElementById('mainArea').innerHTML = h;
  restore(id);
}

function renderQ(q) {
  let b = '';
  const id = q.id;
  if (q.type==='yn') {
    b=`<div class="a-yn">
      <button class="yn" id="yn_y_${id}" onclick="setYN('${id}','yes')">Evet</button>
      <button class="yn" id="yn_p_${id}" onclick="setYN('${id}','partial')">Kısmen</button>
      <button class="yn" id="yn_n_${id}" onclick="setYN('${id}','no')">Hayır</button>
    </div>`;
  } else if (q.type==='opts') {
    b=`<div class="a-opts">`+q.opts.map(o=>`<button class="opt" id="op_${id}_${s(o)}" onclick="setOp('${id}','${o.replace(/'/g,"\\'")}','${s(o)}')">${o}</button>`).join('')+`</div>`;
  } else if (q.type==='mc') {
    b=`<div class="a-opts">`+q.opts.map(o=>`<button class="opt" id="mc_${id}_${s(o)}" onclick="tMC('${id}','${o.replace(/'/g,"\\'")}','${s(o)}')">${o}</button>`).join('')+`</div>`;
  } else if (q.type==='number') {
    b=`<div class="a-num"><input class="num-in" type="number" id="n_${id}" min="0" placeholder="0" oninput="answers['${id}']=this.value">${q.unit?`<span class="num-unit">${q.unit}</span>`:''}</div>`;
  } else if (q.type==='txt') {
    b=`<div class="a-txt"><textarea id="t_${id}" placeholder="${q.ph||''}" oninput="answers['${id}']=this.value"></textarea></div>`;
  } else if (q.type==='note') {
    b=`<div class="a-note"><div class="note-lbl"><svg><use href="#i-pen"/></svg> Not / Özel Gereksinim</div><textarea id="no_${id}" placeholder="${q.ph||'Notlarınızı buraya girin...'}" oninput="answers['${id}']=this.value"></textarea></div>`;
  }
  return `<div class="qi"><div class="qi-q">${q.req?'<span class="qi-req">*</span>':''}${q.t}</div>${b}</div>`;
}

const s = v => v.replace(/\W+/g,'_');

// ── ANSWER HANDLERS ────────────────────────────────────────
function setYN(id,v) {
  answers[id]=v;
  ['y','p','n'].forEach(k=>{
    const el=document.getElementById(`yn_${k}_${id}`); if(!el)return;
    const map={y:'yes',p:'partial',n:'no'};
    el.className='yn'+(map[k]===v?' '+k:'');
  });
}
function setOp(id,v,safe) {
  answers[id]=v;
  document.querySelectorAll(`[id^="op_${id}_"]`).forEach(b=>b.classList.remove('sel'));
  document.getElementById(`op_${id}_${safe}`)?.classList.add('sel');
}
function tMC(id,v,safe) {
  if(!Array.isArray(answers[id]))answers[id]=[];
  const i=answers[id].indexOf(v);
  i>=0?answers[id].splice(i,1):answers[id].push(v);
  document.getElementById(`mc_${id}_${safe}`)?.classList.toggle('sel',answers[id].includes(v));
}
function tSm(modId,name,key) {
  answers[key]=answers[key]==='1'?'':'1';
  document.getElementById(`smg_${modId}`)?.querySelectorAll('.sm-tag').forEach(t=>{
    if(t.textContent.trim()===name) t.classList.toggle('sel',answers[key]==='1');
  });
}
function setSt(id,v) { modSt[id]=v; buildSB(); renderMod(id); }

function restore(id) {
  const groups = QUESTIONS[id]||[];
  groups.forEach(g=>g.qs.forEach(q=>{
    const v=answers[q.id]; if(v===undefined||v===null)return;
    if(q.type==='yn'){
      const map={yes:'y',partial:'p',no:'n'};
      ['y','p','n'].forEach(k=>{const el=document.getElementById(`yn_${k}_${q.id}`);if(!el)return;const mv={y:'yes',p:'partial',n:'no'};el.className='yn'+(v===mv[k]?' '+k:'');});
    } else if(q.type==='opts'){
      if(v){document.querySelectorAll(`[id^="op_${q.id}_"]`).forEach(b=>b.classList.remove('sel'));document.getElementById(`op_${q.id}_${s(v)}`)?.classList.add('sel');}
    } else if(q.type==='mc'){
      if(Array.isArray(v))v.forEach(vv=>document.getElementById(`mc_${q.id}_${s(vv)}`)?.classList.add('sel'));
    } else if(q.type==='number'){const el=document.getElementById(`n_${q.id}`);if(el)el.value=v;}
    else if(q.type==='txt'){const el=document.getElementById(`t_${q.id}`);if(el)el.value=v;}
    else if(q.type==='note'){const el=document.getElementById(`no_${q.id}`);if(el)el.value=v;}
  }));
  (SUBMODULES[id]||[]).forEach(sm=>{
    const key=`sm_${id}_${sm.replace(/\W+/g,'_')}`;
    document.getElementById(`smg_${id}`)?.querySelectorAll('.sm-tag').forEach(t=>{
      if(t.textContent.trim()===sm)t.classList.toggle('sel',answers[key]==='1');
    });
  });
}

// ── SAVE / LOAD ────────────────────────────────────────────
const IDX_KEY = 'erp_index_v1';

function getIndex() {
  try { return JSON.parse(localStorage.getItem(IDX_KEY)) || []; } catch { return []; }
}
function setIndex(arr) {
  localStorage.setItem(IDX_KEY, JSON.stringify(arr));
}

function saveProgress() {
  const customer = document.getElementById('customerName').value.trim();
  const analyst  = document.getElementById('analystName').value.trim();
  const date     = document.getElementById('analysisDate').value;
  if (!customer) { toast('Müşteri adı girin', 'warn'); return; }

  const idx = getIndex();
  // Aynı müşteri varsa güncelle, yoksa yeni ekle
  let entry = idx.find(e => e.customer === customer);
  const key = entry ? entry.key : 'erp_a_' + Date.now();
  const now = Date.now();

  if (!entry) {
    entry = { key, customer, analyst, date, savedAt: now };
    idx.unshift(entry);
  } else {
    entry.analyst = analyst;
    entry.date    = date;
    entry.savedAt = now;
    // Başa taşı
    const i = idx.indexOf(entry);
    if (i > 0) { idx.splice(i, 1); idx.unshift(entry); }
  }

  const activeCount  = MODULES.filter(m => modSt[m.id] === 'yes').length;
  const partialCount = MODULES.filter(m => modSt[m.id] === 'partial').length;
  entry.activeCount  = activeCount;
  entry.partialCount = partialCount;

  setIndex(idx);
  localStorage.setItem(key, JSON.stringify({ customer, analyst, date, answers, modSt, savedAt: now }));
  toast('Kaydedildi ✓', 'ok');
}

function loadAnalysis(key) {
  const d = localStorage.getItem(key);
  if (!d) { toast('Kayıt bulunamadı', 'warn'); return; }
  const p = JSON.parse(d);
  document.getElementById('customerName').value = p.customer || '';
  document.getElementById('analystName').value  = p.analyst  || '';
  document.getElementById('analysisDate').value = p.date     || '';
  answers = p.answers || {}; modSt = p.modSt || {};
  onCI(); buildSB();
  if (curId) renderMod(curId); else renderWelcome();
  closeDrawer();
  toast('Analiz yüklendi', 'ok');
}

function deleteAnalysis(key, e) {
  e.stopPropagation();
  if (!confirm('Bu analizi silmek istediğinize emin misiniz?')) return;
  const idx = getIndex().filter(e => e.key !== key);
  setIndex(idx);
  localStorage.removeItem(key);
  renderDrawer();
  toast('Silindi', 'ok');
}

function newAnalysis() {
  if (!confirm('Mevcut analizi kapatıp yeni başlamak istiyor musunuz?')) return;
  answers = {}; modSt = {};
  document.getElementById('customerName').value = '';
  document.getElementById('analystName').value  = '';
  document.getElementById('analysisDate').value = new Date().toISOString().split('T')[0];
  onCI(); buildSB(); curId = null; renderWelcome();
  closeDrawer();
}

// Eski tek-kayıt yedek (geriye dönük uyumluluk)
function loadProgress() { showDrawer(); }

// ── DRAWER ─────────────────────────────────────────────────
function showDrawer() {
  renderDrawer();
  document.getElementById('drawerOv').classList.add('open');
}
function closeDrawer(e) {
  if (e && e.target !== document.getElementById('drawerOv')) return;
  document.getElementById('drawerOv').classList.remove('open');
}

function renderDrawer() {
  const idx = getIndex();
  const drCount = document.getElementById('drCount');
  const drList  = document.getElementById('drList');
  drCount.textContent = idx.length
    ? `${idx.length} kayıtlı analiz`
    : 'Henüz kayıt yok';

  if (!idx.length) {
    drList.innerHTML = `
      <div class="dr-empty">
        <div class="dr-empty-ico">📂</div>
        <p>Henüz kayıtlı analiz yok.<br>Müşteri bilgilerini doldurup <strong style="color:var(--txt1)">Kaydet</strong>'e basın.</p>
      </div>`;
    return;
  }

  drList.innerHTML = idx.map(entry => {
    const d = new Date(entry.savedAt);
    const timeStr = d.toLocaleDateString('tr-TR') + ' ' + d.toLocaleTimeString('tr-TR', {hour:'2-digit',minute:'2-digit'});
    const initials = (entry.customer || '?').substring(0,2).toUpperCase();
    const yes = entry.activeCount  || 0;
    const par = entry.partialCount || 0;
    const no  = 12 - yes - par;
    return `
      <div class="dr-card">
        <div class="dr-card-top">
          <div class="dr-card-avatar">${initials}</div>
          <div class="dr-card-info">
            <div class="dr-card-name">${entry.customer}</div>
            <div class="dr-card-meta">${entry.analyst ? '👤 ' + entry.analyst : ''} ${entry.date ? '· 📅 ' + entry.date : ''}</div>
            <div class="dr-card-time">🕐 ${timeStr}</div>
          </div>
        </div>
        <div class="dr-card-stats">
          <div class="dr-stat yes"><div class="dr-stat-n">${yes}</div><div class="dr-stat-l">Kullanıyor</div></div>
          <div class="dr-stat par"><div class="dr-stat-n">${par}</div><div class="dr-stat-l">Kısmen</div></div>
          <div class="dr-stat"><div class="dr-stat-n" style="color:var(--txt3)">${no}</div><div class="dr-stat-l">Belirsiz/Hayır</div></div>
        </div>
        <div class="dr-card-btns">
          <button class="dr-btn-load" onclick="loadAnalysis('${entry.key}')">
            <svg><use href="#i-folder"/></svg> Yükle
          </button>
          <button class="dr-btn-del" onclick="deleteAnalysis('${entry.key}', event)" title="Sil">
            <svg><use href="#i-x"/></svg>
          </button>
        </div>
      </div>`;
  }).join('');
}
// ── THEME SYSTEM ───────────────────────────────────────────
function toggleThemePanel(e) {
  e.stopPropagation();
  document.getElementById('themePanel').classList.toggle('open');
}
document.addEventListener('click', (e) => {
  const p = document.getElementById('themePanel');
  if (p && !p.contains(e.target)) p.classList.remove('open');
});

function setTheme(mode) {
  document.documentElement.dataset.theme = mode;
  document.getElementById('btnDark').classList.toggle('active', mode === 'dark');
  document.getElementById('btnLight').classList.toggle('active', mode === 'light');
  localStorage.setItem('erp_theme', mode);
}

function setAccent(name, el) {
  document.documentElement.dataset.accent = name;
  document.querySelectorAll('.tp-swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  localStorage.setItem('erp_accent', name);
}

function loadThemePrefs() {
  const theme  = localStorage.getItem('erp_theme')  || 'dark';
  const accent = localStorage.getItem('erp_accent') || 'indigo';
  document.documentElement.dataset.theme  = theme;
  document.documentElement.dataset.accent = accent;
  document.getElementById('btnDark').classList.toggle('active',  theme === 'dark');
  document.getElementById('btnLight').classList.toggle('active', theme === 'light');
  document.querySelectorAll('.tp-swatch').forEach(s => {
    s.classList.toggle('active', s.dataset.accent === accent);
  });
}

function toast(msg,type='ok') {
  const t=document.createElement('div');
  t.className=`toast t-${type}`;
  t.textContent=type==='ok'?`✓ ${msg}`:msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2800);
}

// ── REPORT ─────────────────────────────────────────────────
function showRpt() {
  saveProgress();
  const cust=document.getElementById('customerName').value||'—';
  const anal=document.getElementById('analystName').value||'—';
  const date=document.getElementById('analysisDate').value||'—';
  const active=MODULES.filter(m=>['yes','partial'].includes(modSt[m.id]||''));
  const inact =MODULES.filter(m=>modSt[m.id]==='no');
  const pend  =MODULES.filter(m=>!modSt[m.id]);

  let h=`
    <div class="r-meta">
      <div class="r-mc"><div class="r-mc-l">Müşteri</div><div class="r-mc-v">${cust}</div></div>
      <div class="r-mc"><div class="r-mc-l">Analist</div><div class="r-mc-v">${anal}</div></div>
      <div class="r-mc"><div class="r-mc-l">Tarih</div><div class="r-mc-v">${date}</div></div>
    </div>
    <div class="r-meta">
      <div class="r-mc" style="border-color:rgba(16,185,129,.22)"><div class="r-mc-l">Aktif Modül</div><div class="r-mc-v" style="color:#34d399">${active.length}</div></div>
      <div class="r-mc" style="border-color:rgba(239,68,68,.18)"><div class="r-mc-l">Kapsam Dışı</div><div class="r-mc-v" style="color:#f87171">${inact.length}</div></div>
      <div class="r-mc" style="border-color:rgba(245,158,11,.22)"><div class="r-mc-l">Belirsiz</div><div class="r-mc-v" style="color:#fbbf24">${pend.length}</div></div>
    </div>
    <div class="r-sec"><div class="r-sec-t">Modül Özeti</div><div class="r-mod-grid">`;

  MODULES.forEach(m=>{
    const st=modSt[m.id]||'';
    const lb={yes:'Kullanılacak',partial:'Kısmen',no:'Kapsam Dışı','':'Belirsiz'}[st];
    h+=`<div class="r-mc2 s-${st||'n'}">
      <div class="r-mc2-ico" style="background:${m.bg};color:${m.color};">
        <svg style="width:15px;height:15px;"><use href="#${m.icon}"/></svg>
      </div>
      <div class="r-mc2-info"><h5>${m.name}</h5><p>${m.desc}</p></div>
      <span class="rbadge rb-${st||'n'}">${lb}</span>
    </div>`;
  });
  h+=`</div></div>`;

  if(active.length){
    h+=`<div class="r-sec"><div class="r-sec-t">Modül Detayları</div>`;
    active.forEach(m=>{
      const st=modSt[m.id];
      h+=`<div class="r-det">
        <div class="r-det-h" style="border-left:3px solid ${m.color}">
          <div class="r-det-h-ico" style="background:${m.bg};color:${m.color};"><svg><use href="#${m.icon}"/></svg></div>
          <span class="r-det-title">${m.name}</span>
          <span class="rbadge rb-${st}">${st==='yes'?'Kullanılacak':'Kısmen'}</span>
        </div>
        <div class="r-body">`;
      (QUESTIONS[m.id]||[]).forEach(g=>g.qs.forEach(q=>{
        const v=answers[q.id]; if(!v&&v!==0)return;
        const dv=Array.isArray(v)?v.join(', '):String(v); if(!dv)return;
        if(q.type==='note') h+=`<div class="r-note">Not: ${dv}</div>`;
        else h+=`<div class="r-row"><span class="r-q">${q.t.replace(/\?$/,'')}</span><span class="r-a">${dv}</span></div>`;
      }));
      const selSubs=(SUBMODULES[m.id]||[]).filter(sm=>answers[`sm_${m.id}_${sm.replace(/\W+/g,'_')}`]==='1');
      if(selSubs.length) h+=`<div class="r-row"><span class="r-q">Kullanılacak alt modüller</span><span class="r-a">${selSubs.join(' · ')}</span></div>`;
      h+=`</div></div>`;
    });
    h+=`</div>`;
  }

  const p1=[],p2=[],p3=[];
  if(['yes','partial'].includes(modSt['SIS']))p1.push('Sistem tanımları');
  if(['yes','partial'].includes(modSt['FIN']))p1.push('Finans – Cari, kasa, banka');
  if(['yes','partial'].includes(modSt['ENV']))p1.push('Envanter – Stok ve depo');
  if(['yes','partial'].includes(modSt['ALM']))p2.push('Satın Alma');
  if(['yes','partial'].includes(modSt['SAT']))p2.push('Satış');
  if(['yes','partial'].includes(modSt['EBL']))p2.push('e-Belge entegrasyonu');
  if(['yes','partial'].includes(modSt['CRM']))p2.push('CRM');
  if(['yes','partial'].includes(modSt['URT']))p3.push('Üretim Yönetimi');
  if(['yes','partial'].includes(modSt['PLN']))p3.push('Planlama & MRP');
  if(['yes','partial'].includes(modSt['BI'])) p3.push('İş Zekası');
  if(['yes','partial'].includes(modSt['ONY']))p3.push('Onay Akışları');

  h+=`<div class="r-sec"><div class="r-sec-t">Devreye Alım Önerileri</div>
    <div class="r-faz">
      ${p1.length?`<span class="faz-t">Faz 1 – Temel Kurulum</span>&nbsp; ${p1.join(' · ')}<br>`:''}
      ${p2.length?`<span class="faz-t">Faz 2 – Operasyonel Modüller</span>&nbsp; ${p2.join(' · ')}<br>`:''}
      ${p3.length?`<span class="faz-t">Faz 3 – Gelişmiş Özellikler</span>&nbsp; ${p3.join(' · ')}<br>`:''}
      ${!p1.length&&!p2.length&&!p3.length?'Modüller için durum belirlendikten sonra öneri oluşturulacaktır.':''}
    </div></div>`;

  document.getElementById('rptBody').innerHTML = h;
  document.getElementById('rptOv').classList.add('open');
}

function closeRpt() { document.getElementById('rptOv').classList.remove('open'); }

function exportJSON() {
  const data={meta:{customer:document.getElementById('customerName').value,analyst:document.getElementById('analystName').value,date:document.getElementById('analysisDate').value,exportedAt:new Date().toISOString()},modSt,answers,summary:MODULES.map(m=>({id:m.id,name:m.name,status:modSt[m.id]||'unset',selectedSubModules:(SUBMODULES[m.id]||[]).filter(sm=>answers[`sm_${m.id}_${sm.replace(/\W+/g,'_')}`]==='1')}))};
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download=`ERP_Analiz_${(document.getElementById('customerName').value||'Musteri').replace(/\s+/g,'_')}_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
}

init();
</script>
